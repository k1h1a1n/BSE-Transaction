
<h2 mat-dialog-title>{{data.title}}</h2>
<div class="text-center mt-4">
    <img src="../../../../../assets/images/check-green.gif" class="img-fluid" alt="">
 </div>
 
 <mat-dialog-content class ="text-center mt-4">

 </mat-dialog-content>

 <mat-dialog-actions align="center">

    <button class="btnOk" mat-dialog-close>OK</button>

 </mat-dialog-actions>
