


 <h2  class="text-center" mat-dialog-title>{{ data.title }}</h2>

<div class="text-center mt-4">
  <img src="../../../../../assets/images/check-green.gif" class="img-fluid" alt="">
</div>

<mat-dialog-content class="text-center mt-4">
  {{ data.message }}
</mat-dialog-content>

<mat-dialog-actions align="center" >

</mat-dialog-actions>
